<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Trámite - Sanatorio Mayo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

header{
background:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
font-size:30px;
font-weight:bold;
color:#006d77;
}

.hero{
height:300px;
background:linear-gradient(rgba(0,90,120,.6),rgba(0,90,120,.6)),
url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:45px;
}

.container{
max-width:700px;
margin:-50px auto 50px auto;
padding:20px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.card h2{
margin-bottom:20px;
color:#003366;
}

input{
width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
font-size:16px;
}

button{
background:#006d77;
color:white;
border:none;
padding:15px 30px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:.9;
}

.resultado{
display:none;
margin-top:25px;
padding:20px;
background:#eef8fa;
border-left:5px solid #006d77;
border-radius:8px;
}

.resultado p{
margin:10px 0;
}

footer{
background:#003366;
color:white;
text-align:center;
padding:20px;
}
</style>

</head>

<body>

<header>
<div class="logo">SM Sanatorio Mayo</div>
</header>

<section class="hero">
<div>
<h1>Consulta de Trámite</h1>
<p>Ingrese el código para consultar el estado.</p>
</div>
</section>

<div class="container">

<div class="card">

<h2>Buscar trámite</h2>

<input
type="text"
id="codigo"
placeholder="Ingrese código de trámite">

<button onclick="consultar()">
Consultar
</button>

<div id="resultado" class="resultado">

<p><strong>Código:</strong> <span id="cod"></span></p>
<p><strong>Estado:</strong> <span id="estado"></span></p>
<p><strong>Fecha de registro:</strong> <span id="fecha"></span></p>
<p><strong>Sede:</strong> <span id="sede"></span></p>
<p><strong>Observación:</strong> <span id="obs"></span></p>

</div>

</div>

</div>

<footer>
© 2026 Sanatorio Mayo
</footer>

<script>

const tramites = {

"TRAMITE001":{
estado:"Completado",
fecha:"02/06/2026",
sede:"Sede Central",
obs:"Trámite procesado correctamente."
},

"TRAMITE002":{
estado:"En revisión",
fecha:"04/06/2026",
sede:"Córdoba Centro",
obs:"Pendiente de validación."
},

"TRAMITE003":{
estado:"Aprobado",
fecha:"06/06/2026",
sede:"Sucursal Norte",
obs:"Registro actualizado."
}

};

function consultar(){

let codigo =
document.getElementById("codigo")
.value
.toUpperCase();

let resultado =
document.getElementById("resultado");

if(tramites[codigo]){

document.getElementById("cod").innerText=codigo;
document.getElementById("estado").innerText=tramites[codigo].estado;
document.getElementById("fecha").innerText=tramites[codigo].fecha;
document.getElementById("sede").innerText=tramites[codigo].sede;
document.getElementById("obs").innerText=tramites[codigo].obs;

resultado.style.display="block";

}else{

alert("Código no encontrado");

}

}

</script>

</body>
</html>
